<!DOCTYPE html>
<html lang="ko">
<head>

<script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.0/dist/chart.umd.min.js"></script>
<style>
:root{--primary:#E27422;--primary-dark:#C45E10;--primary-light:#F4983E;
--primary-bg:rgba(226,116,34,.08);--accent:#8B6914;
--bg:#FBF7F2;--card:#fff;--text:#2A2218;--sub:#8C7E6F;--border:#EAE0D4;}
*{box-sizing:border-box;margin:0;padding:0;}
body{font-family:'Apple SD Gothic Neo','Noto Sans KR',sans-serif;background:var(--bg);color:var(--text);padding:0 0 40px;max-width:640px;margin:0 auto;}

.progress-bar-outer{flex:1;background:#F2E8DB;border-radius:10px;height:10px;overflow:hidden;}

.record-wrap{overflow-x:auto;-webkit-overflow-scrolling:touch;}
.record-table{width:100%;border-collapse:collapse;font-size:.74rem;background:var(--card);border-radius:14px;overflow:hidden;box-shadow:0 2px 10px rgba(0,0,0,.06);}
.record-table th{background:linear-gradient(135deg,var(--primary),var(--primary-dark));color:#fff;padding:9px 6px;text-align:center;white-space:nowrap;font-weight:600;}

.missing{color:#ccc;font-style:italic;font-size:.72rem;}
.calc-card{background:var(--card);border-radius:16px;margin:0 0 14px;padding:20px 18px;box-shadow:0 2px 10px rgba(0,0,0,.06);border:1px solid var(--border);}
.calc-title{font-size:1rem;font-weight:800;color:var(--primary-dark);margin-bottom:14px;display:flex;align-items:center;gap:8px;}
.calc-title img{width:24px;height:24px;object-fit:contain;}
.calc-gender{display:flex;gap:8px;margin-bottom:16px;}
.calc-gender button{flex:1;padding:8px;border:2px solid var(--primary);border-radius:10px;background:transparent;color:var(--primary);font-weight:700;font-size:.85rem;cursor:pointer;transition:all .15s;}
.calc-gender button.active{background:var(--primary);color:#fff;}
.calc-row{display:flex;align-items:center;gap:10px;margin-bottom:12px;padding:10px 12px;background:#FFF9F3;border-radius:10px;border:1px solid #F0DCC8;}
.calc-row label{font-size:.8rem;font-weight:700;color:var(--text);min-width:72px;}
.calc-row input{flex:1;padding:8px 10px;border:1.5px solid var(--border);border-radius:8px;font-size:.88rem;text-align:center;outline:none;transition:border-color .2s;max-width:120px;font-weight:600;}
.calc-row input:focus{border-color:var(--primary);}
.calc-row .calc-score{font-size:.82rem;font-weight:800;color:var(--primary);min-width:80px;text-align:right;}
.calc-row .calc-unit{font-size:.72rem;color:var(--sub);min-width:24px;}
.calc-result{margin-top:16px;padding:16px;background:linear-gradient(135deg,#FFF8EE,#FFF1DC);border-radius:12px;text-align:center;border:1px dashed var(--primary-light);}
.calc-result-label{font-size:.78rem;color:var(--sub);font-weight:600;margin-bottom:4px;}
.calc-result-score{font-size:2rem;font-weight:900;color:var(--primary-dark);}
.calc-result-detail{font-size:.72rem;color:var(--sub);margin-top:6px;line-height:1.6;}
.calc-reset{display:block;margin:12px auto 0;padding:8px 24px;border:1.5px solid var(--primary);border-radius:8px;background:transparent;color:var(--primary);font-weight:700;font-size:.8rem;cursor:pointer;}
.calc-reset:active{background:var(--primary);color:#fff;}
.calc-ref{margin-top:14px;padding:12px;background:#FAF6F0;border-radius:10px;font-size:.72rem;color:var(--sub);line-height:1.7;}
.calc-ref strong{color:var(--text);}
/* ── 영상 탭 ── */
.video-timeline{position:relative;padding-left:22px;}
.video-timeline::before{content:'';position:absolute;left:8px;top:0;bottom:0;width:2px;background:var(--border);}
.video-item{position:relative;margin-bottom:20px;}
.video-item::before{content:'';position:absolute;left:-17px;top:16px;width:12px;height:12px;background:var(--primary);border-radius:50%;border:2px solid #fff;box-shadow:0 0 0 2px var(--primary);}
.video-item.official::before{background:#f39c12;box-shadow:0 0 0 2px #f39c12;}
.video-card{background:var(--card);border-radius:14px;box-shadow:0 2px 10px rgba(0,0,0,.06);border:1px solid var(--border);overflow:hidden;}
.video-meta{padding:11px 16px;display:flex;justify-content:space-between;align-items:center;background:#FFF9F3;border-bottom:1px solid var(--border);}
.video-date-badge{font-size:.8rem;font-weight:700;color:var(--primary-dark);}
.video-type-badge{font-size:.72rem;background:#FFF1DC;color:var(--primary-dark);border-radius:12px;padding:3px 10px;font-weight:600;}
.video-item.official .video-meta{background:#FFF8EE;}
.video-item.official .video-type-badge{background:#FFE8A0;color:#7d4e00;}
.video-heart{font-size:1.3rem;cursor:pointer;user-select:none;transition:transform .15s;line-height:1;}
.video-heart:active{transform:scale(1.35);}
.video-embed{width:100%;aspect-ratio:16/9;border:none;display:block;background:#000;}
.video-placeholder{padding:24px;text-align:center;color:var(--sub);font-size:.85rem;background:#FAF6F0;}
.video-fav-label{font-size:.7rem;color:#e74c3c;text-align:right;padding:4px 14px;font-weight:700;background:#fff5f5;}
.fav-section{background:var(--card);border-radius:14px;padding:14px 16px;margin-bottom:16px;box-shadow:0 2px 10px rgba(0,0,0,.06);border:1px solid var(--border);}
.fav-title{font-size:.88rem;font-weight:800;color:var(--primary-dark);margin-bottom:10px;}
.fav-empty{font-size:.8rem;color:var(--sub);text-align:center;padding:8px 0;}
.fav-mini-item{font-size:.8rem;padding:5px 0;color:var(--primary-dark);border-bottom:1px solid var(--border);display:flex;align-items:center;gap:6px;}
.fav-mini-item:last-child{border-bottom:none;}
.video-empty{text-align:center;padding:48px 20px;color:var(--sub);font-size:.9rem;background:var(--card);border-radius:14px;border:1px solid var(--border);}
</style>

<body>
<div id="app"><div class="loading">⏳ 데이터 불러오는 중...</div></div>
<script>
var SHEET_ID='1-uvH7koGGIEYXO8mL56xVUbUWXEbNPVuVP3htZ2wQMY';
var SHEET_TAB='동국대학교체육교육과';
var VIDEO_TAB='실기영상';
var LOGO_SRC='images/dongguk.png';
var CSV_URL='https://docs.google.com/spreadsheets/d/'+SHEET_ID+'/gviz/tq?tqx=out:csv&sheet='+encodeURIComponent(SHEET_TAB);
var VIDEO_URL='https://docs.google.com/spreadsheets/d/'+SHEET_ID+'/gviz/tq?tqx=out:csv&sheet='+encodeURIComponent(VIDEO_TAB);

/* 계산기 전용 선형보간 기준 */
var REF={
  '남':{strength:{max:220,min:130},flex:{max:30.0,min:11.9},jump:{max:300,min:254},run:{max:7.19,min:9.90}},
  '여':{strength:{max:151,min:60},flex:{max:32.0,min:13.9},jump:{max:250,min:199},run:{max:7.60,min:10.90}}
};
var FOUL_SCORE=50;
var MULTI=1.75;

var EVENTS=[
  {key:'strength',label:'배근력',unit:'kg',lowerBetter:false},
  {key:'flex',label:'좌전굴',unit:'cm',lowerBetter:false},
  {key:'jump',label:'제자리멀리뛰기',unit:'cm',lowerBetter:false},
  {key:'run',label:'중량달리기',unit:'초',lowerBetter:true}
];

function getScoreKey(k){return k==='strength'?'strScore':k==='flex'?'flexScore':k==='jump'?'jumpScore':'runScore';}
function getFoulKey(k){return k==='strength'?'strFoul':k==='flex'?'flexFoul':k==='jump'?'jumpFoul':'runFoul';}

function parseVal(raw){
  if(raw===undefined||raw===null)return{v:null,foul:false};
  var s=String(raw).trim();
  if(s===''||s==='-')return{v:null,foul:false};
  if(s.toUpperCase()==='F')return{v:null,foul:true};
  var n=parseFloat(s.replace(/,/g,''));
  return isNaN(n)?{v:null,foul:false}:{v:n,foul:false};
}

function pv(v){
  if(v===undefined||v===null)return null;
  var s=String(v).replace(/,/g,'').trim();
  if(s===''||s.toUpperCase()==='F')return null;
  var n=parseFloat(s);return isNaN(n)?null:n;
}

/* 계산기 전용 선형보간 (시트 점수와 무관) */
function calcRawScore(evKey,val,gender){
  if(val===null)return null;
  var g=gender==='여'?'여':'남';
  var r=REF[g];if(!r||!r[evKey])return null;
  var ref=r[evKey],sc;
  if(evKey==='run'){
    if(val<=ref.max)sc=100;else if(val>=ref.min)sc=50;
    else sc=(ref.min-val)/(ref.min-ref.max)*50+50;
  }else{
    if(val>=ref.max)sc=100;else if(val<=ref.min)sc=50;
    else sc=(val-ref.min)/(ref.max-ref.min)*50+50;
  }
  return Math.round(sc*10000)/10000;
}

function isOfficial(t){return(t||'').indexOf('공식')!==-1;}
function normalizeDate(d){
  if(!d)return'00000000';
  if(d.indexOf('.')!==-1)return d.replace(/\./g,'').padEnd(8,'0');
  var m=d.match(/^(\d{2})-(\d{2})$/);
  if(m)return String(2000+parseInt(m[1]))+m[2]+'00';
  return d.replace(/\D/g,'').padEnd(8,'0');
}
function fmt(v){return v!==null?v.toFixed(2):'—';}
function descSort(arr){return arr.slice().sort(function(a,b){var da=normalizeDate(a.date),db=normalizeDate(b.date);return da>db?-1:da<db?1:0;});}

function parseCSV(text){
  var rows=[],lines=text.split(/\r?\n/);
  for(var i=0;i<lines.length;i++){
    var line=lines[i];if(!line.trim())continue;
    var row=[],cell='',inQ=false;
    for(var j=0;j<line.length;j++){var c=line[j];if(inQ){if(c==='"'){if(line[j+1]==='"'){cell+='"';j++;}else inQ=false;}else cell+=c;}else{if(c==='"')inQ=true;else if(c===','){row.push(cell);cell='';}else cell+=c;}}
    row.push(cell);rows.push(row);
  }
  return rows;
}

/* ★ 핵심 수정: 시트 환산점수(9,11,13,15열) 직접 읽기 */
function parseStudent(name,rows){
  var records=[];
  for(var i=1;i<rows.length;i++){
    var r=rows[i];if(!r||r.length<13)continue;
    if((r[2]||'').trim()!==name)continue;
    var gender=(r[3]||'').trim();
    var gKey=(gender==='여'||gender==='여자')?'여':'남';

    var str=parseVal(r[8]),flex=parseVal(r[10]),jump=parseVal(r[12]),run=parseVal(r[14]);

    /* 환산점수: 시트 값 직접 사용 (파울이면 FOUL_SCORE=50) */
    var strScore=str.foul?FOUL_SCORE:pv(r[9]);
    var flexScore=flex.foul?FOUL_SCORE:pv(r[11]);
    var jumpScore=jump.foul?FOUL_SCORE:pv(r[13]);
    var runScore=run.foul?FOUL_SCORE:(run.v===null&&pv(r[15])===0?null:pv(r[15]));

    var acad=pv(r[7]);
    var totVal=pv(r[16]);
    var total=totVal;
    if(total===null){
      var sc=[strScore,flexScore,jumpScore,runScore];
      if(sc.every(function(v){return v!==null;})){
        total=Math.round(((acad||0)+sc.reduce(function(a,b){return a+b;},0))*100)/100;
      }
    }

    records.push({
      type:(r[0]||'').trim(),date:(r[1]||'').trim(),
      name:(r[2]||'').trim(),gender:gKey,
      school:(r[4]||'').trim(),univ:(r[5]||'').trim(),dept:(r[6]||'').trim(),
      acad:acad,
      strength:str.v,strFoul:str.foul,strScore:strScore,
      flex:flex.v,flexFoul:flex.foul,flexScore:flexScore,
      jump:jump.v,jumpFoul:jump.foul,jumpScore:jumpScore,
      run:run.v,runFoul:run.foul,runScore:runScore,
      total:total
    });
  }
  records.sort(function(a,b){return normalizeDate(a.date)<normalizeDate(b.date)?-1:1;});
  return records;
}

/* ★ 추가: 영상 시트 파싱 */
function parseVideos(name,univName,rows){
  var videos=[];
  for(var i=1;i<rows.length;i++){
    var r=rows[i];if(!r||r.length<7)continue;
    if((r[2]||'').trim()!==name)continue;
    if(univName&&(r[0]||'').trim()!==univName)continue;
    var url=(r[6]||'').trim();if(!url)continue;
    videos.push({univ:(r[0]||'').trim(),dept:(r[1]||'').trim(),name:(r[2]||'').trim(),
      school:(r[3]||'').trim(),date:(r[4]||'').trim(),type:(r[5]||'').trim(),url:url});
  }
  videos.sort(function(a,b){return normalizeDate(a.date)<normalizeDate(b.date)?-1:1;});
  return videos;
}

/* ★ 추가: Google Drive / YouTube 임베드 변환 */
function toEmbedUrl(url){
  if(!url)return null;
  var yt=url.match(/(?:youtu\.be\/|youtube\.com\/(?:watch\?v=|embed\/|shorts\/))([A-Za-z0-9_-]{11})/);
  if(yt)return'https://www.youtube.com/embed/'+yt[1];
  var dr=url.match(/\/file\/d\/([^\/\?]+)/);
  if(dr)return'https://drive.google.com/file/d/'+dr[1]+'/preview';
  return null;
}

function rawDisplay(r,evKey,unit){
  var fk=getFoulKey(evKey);
  if(r[fk])return'<span class="foul-tag">FOUL</span>';
  return r[evKey]!==null?r[evKey]+' '+unit:'<span class="missing">미측정</span>';
}

/* ── Hero (원본 그대로) ── */
function renderHero(records,el){
  var r=records[0];if(!r){el.innerHTML='';return;}
  var off=records.filter(function(x){return isOfficial(x.type);});
  var last=off.length?off[off.length-1]:records[records.length-1];
  var acad=last.acad!==null?last.acad:0;
  var sc=[last.strScore,last.flexScore,last.jumpScore,last.runScore];
  var allHave=sc.every(function(v){return v!==null;});
  var sum=allHave?sc.reduce(function(a,b){return a+b;},0):null;
  var total=last.total;

function buildChart(ev,records,type){
  var canvas=document.getElementById('chart-'+ev.key);if(!canvas)return;
  if(_charts[ev.key]){_charts[ev.key].destroy();}
  var labels=records.map(function(r){return r.date||'(없음)';});
  var rawData=records.map(function(r){return r[ev.key];});
  var pC=records.map(function(r){return isOfficial(r.type)?'#C45E10':'#E27422';});
  var pS=records.map(function(r){return isOfficial(r.type)?8:5;});
  var pSt=records.map(function(r){return isOfficial(r.type)?'rectRot':'circle';});
  var ds;
  if(type==='bar'){ds=[{label:ev.label,data:rawData,backgroundColor:records.map(function(r){return isOfficial(r.type)?'rgba(196,94,16,.7)':'rgba(226,116,34,.45)';}),borderColor:records.map(function(r){return isOfficial(r.type)?'#C45E10':'#E27422';}),borderWidth:2,borderRadius:6}];}
  else{ds=[{label:ev.label,data:rawData,borderColor:'#E27422',backgroundColor:'rgba(226,116,34,.08)',tension:.35,pointRadius:pS,pointBackgroundColor:pC,pointBorderColor:pC,pointStyle:pSt,pointBorderWidth:2,fill:true,borderWidth:3}];}
  _charts[ev.key]=new Chart(canvas,{type:type,data:{labels:labels,datasets:ds},options:{responsive:true,maintainAspectRatio:false,interaction:{intersect:false,mode:'index'},scales:{x:{grid:{display:false}},y:{beginAtZero:false,title:{display:true,text:ev.unit}}},plugins:{legend:{display:false},tooltip:{callbacks:{label:function(ctx){var idx=ctx.dataIndex;var r=window._RECORDS[idx];var sk=getScoreKey(ev.key);var fk=getFoulKey(ev.key);var val=ctx.parsed.y;var sc=r?r[sk]:null;var line=ev.label+': ';if(r&&r[fk])line+='FOUL (기본 '+FOUL_SCORE+'점)';else{line+=(val!==null?val+' '+ev.unit:'미측정');if(sc!==null)line+=' (원점수 '+sc.toFixed(2)+')';}if(r&&isOfficial(r.type))line+=' ⭐공식';return line;}}}}}});
}
function buildProgress(ev,records){
  var el=document.getElementById('prog-'+ev.key);if(!el)return;
  var vals=records.map(function(r){return r[ev.key];}).filter(function(v){return v!==null;});
  if(!vals.length){el.innerHTML='';return;}
  var max=Math.max.apply(null,vals),min=Math.min.apply(null,vals);
  el.innerHTML=records.map(function(r){
    if(r[ev.key]===null&&!r[getFoulKey(ev.key)])return'';
    var foul=r[getFoulKey(ev.key)];
    var pct=foul?5:(ev.lowerBetter?(max===min?100:Math.round((1-(r[ev.key]-min)/(max-min))*100)):(max===0?0:Math.round(r[ev.key]/max*100)));
    var isOff=isOfficial(r.type);var bold=isOff?'font-weight:700;color:var(--primary-dark)':'';
    var barClass=isOff?'progress-bar-inner official-bar':'progress-bar-inner';
    var tag=isOff?' ⭐':'';
    var valText=foul?'FOUL':r[ev.key];
    return'<div class="progress-row"><span class="progress-date" style="'+bold+'">'+r.date+tag+'</span>'+
      '<div class="progress-bar-outer"><div class="'+barClass+'" style="width:'+pct+'%"></div></div>'+
      '<span class="progress-val" style="'+bold+(foul?';color:#e74c3c':'')+'">'+valText+'</span></div>';
  }).join('');
}
function buildDetailTable(ev,records){
  var el=document.getElementById('detail-'+ev.key);if(!el)return;

    sorted.map(function(r){var sc=r[sk];

    }).join('')+'</tbody></table>';
}
function switchChartType(key,type,e){e.stopPropagation();var ev;for(var i=0;i<EVENTS.length;i++){if(EVENTS[i].key===key){ev=EVENTS[i];break;}}if(!ev)return;document.getElementById('btn-line-'+key).classList.toggle('active',type==='line');document.getElementById('btn-bar-'+key).classList.toggle('active',type==='bar');buildChart(ev,window._RECORDS,type);}
function toggleCard(key){var b=document.getElementById('body-'+key);if(b)b.style.display=b.style.display==='none'?'':'none';}
function toggleDetail(key){var el=document.getElementById('detail-'+key);if(el)el.style.display=el.style.display==='none'?'':'none';}

    '<div class="calc-row"><label>달리기</label><input type="number" id="calc-run" step="0.01" placeholder="초" oninput="updateCalc()"><span class="calc-unit">초</span><span class="calc-score" id="calc-run-sc"></span></div>'+

function setCalcGender(g){_calcGender=g;var m=document.getElementById('calc-g-m'),f=document.getElementById('calc-g-f');if(m)m.classList.toggle('active',g==='남');if(f)f.classList.toggle('active',g==='여');updateCalcRef();updateCalc();}
function updateCalcRef(){
  var s=REF[_calcGender];var el=document.getElementById('calc-ref');if(!el||!s)return;
  el.innerHTML='<strong>'+_calcGender+'자 기준 (원점수 50~100점, ×1.75 → 실기700점)</strong><br>'+
    '배근력: '+s.strength.max+'kg↑=100, '+s.strength.min+'kg↓=50<br>'+

    '멀리뛰기: '+s.jump.max+'cm↑=100, '+s.jump.min+'cm↓=50<br>'+
    '달리기: '+s.run.max+'초↓=100, '+s.run.min+'초↑=50<br>'+
    '<br><strong>파울(F) 시: 해당 종목 기본점수 50점</strong>';

function updateCalc(){
  if(!_calcInited)return;
  var acadEl=document.getElementById('calc-acad'),strEl=document.getElementById('calc-str'),flexEl=document.getElementById('calc-flex'),jumpEl=document.getElementById('calc-jump'),runEl=document.getElementById('calc-run');
  if(!acadEl||!strEl||!flexEl||!jumpEl||!runEl)return;
  var acad=parseFloat(acadEl.value)||0;
  var strV=parseFloat(strEl.value),flexV=parseFloat(flexEl.value),jumpV=parseFloat(jumpEl.value),runV=parseFloat(runEl.value);
  var strSc=isNaN(strV)?null:calcRawScore('strength',strV,_calcGender);
  var flexSc=isNaN(flexV)?null:calcRawScore('flex',flexV,_calcGender);
  var jumpSc=isNaN(jumpV)?null:calcRawScore('jump',jumpV,_calcGender);
  var runSc=isNaN(runV)?null:calcRawScore('run',runV,_calcGender);
  var e;
  e=document.getElementById('calc-acad-sc');if(e)e.textContent=acad?acad.toFixed(2)+'점':'';
  e=document.getElementById('calc-str-sc');if(e)e.textContent=strSc!==null?strSc.toFixed(2)+' → '+(strSc*MULTI).toFixed(2):'';
  e=document.getElementById('calc-flex-sc');if(e)e.textContent=flexSc!==null?flexSc.toFixed(2)+' → '+(flexSc*MULTI).toFixed(2):'';
  e=document.getElementById('calc-jump-sc');if(e)e.textContent=jumpSc!==null?jumpSc.toFixed(2)+' → '+(jumpSc*MULTI).toFixed(2):'';
  e=document.getElementById('calc-run-sc');if(e)e.textContent=runSc!==null?runSc.toFixed(2)+' → '+(runSc*MULTI).toFixed(2):'';
  var all=[strSc,flexSc,jumpSc,runSc];
  var filled=all.filter(function(v){return v!==null;});
  var totalEl=document.getElementById('calc-total'),detailEl=document.getElementById('calc-detail');
  if(!totalEl||!detailEl)return;
  if(filled.length===4){
    var rawSum=filled.reduce(function(a,b){return a+b;},0);
    var realSum=Math.round(rawSum*MULTI*100)/100;
    var total=Math.round((acad+realSum)*100)/100;
    totalEl.textContent=total.toFixed(2)+'점';
    detailEl.innerHTML='내신 '+acad.toFixed(2)+' + 실기원점수 '+rawSum.toFixed(2)+' × 1.75 = 실기 '+realSum.toFixed(2)+'<br>총점: '+acad.toFixed(2)+' + '+realSum.toFixed(2)+' = <strong>'+total.toFixed(2)+'</strong>';
  }else{
    totalEl.textContent=filled.length>0?'입력 '+filled.length+'/4':'—';
    detailEl.textContent=filled.length>0?'모든 종목을 입력하면 총점이 계산됩니다':'종목 기록을 입력해주세요';
  }
}
function resetCalc(){['calc-str','calc-flex','calc-jump','calc-run'].forEach(function(id){var el=document.getElementById(id);if(el)el.value='';});updateCalc();}

/* ★ 추가: 영상 탭 렌더링 */
function getFavKey(name){return'fav_dongguk_'+name;}
function getFavs(name){try{return JSON.parse(localStorage.getItem(getFavKey(name))||'[]');}catch(e){return[];}}
function saveFavs(name,favs){localStorage.setItem(getFavKey(name),JSON.stringify(favs));}
function toggleFav(name,date,type){
  var favs=getFavs(name);var id=date+'__'+type;
  var idx=favs.indexOf(id);if(idx===-1)favs.push(id);else favs.splice(idx,1);
  saveFavs(name,favs);return idx===-1;
}

function renderFavSection(name,videos,container){
  var favs=getFavs(name);
  var favVids=videos.filter(function(v){return favs.indexOf(v.date+'__'+v.type)!==-1;});
  container.innerHTML='';
  var sec=document.createElement('div');sec.className='fav-section';
  if(favVids.length){
    sec.innerHTML='<div class="fav-title">❤️ 즐겨찾기 ('+favVids.length+'개)</div>';
    favVids.forEach(function(v){
      var d=document.createElement('div');d.className='fav-mini-item';
      d.textContent='📅 '+v.date+' · '+v.type;sec.appendChild(d);
    });
  }else{
    sec.innerHTML='<div class="fav-title">❤️ 즐겨찾기</div><div class="fav-empty">하트를 눌러 최고 영상을 저장해보세요!</div>';
  }
  container.appendChild(sec);
}

function renderVideoTab(videos,name,el){
  el.innerHTML='';
  var favContainer=document.createElement('div');
  el.appendChild(favContainer);
  renderFavSection(name,videos,favContainer);

  if(!videos.length){
    var empty=document.createElement('div');empty.className='video-empty';
    empty.innerHTML='📹 아직 등록된 영상이 없어요<br><small style="color:var(--sub);margin-top:6px;display:block;">실기영상 시트에 링크를 추가해주세요</small>';
    el.appendChild(empty);return;
  }

  var tl=document.createElement('div');tl.className='video-timeline';
  videos.forEach(function(v){
    var embedUrl=toEmbedUrl(v.url);
    var favs=getFavs(name);
    var isFav=favs.indexOf(v.date+'__'+v.type)!==-1;
    var item=document.createElement('div');
    item.className='video-item'+(isOfficial(v.type)?' official':'');

    item.innerHTML=
      '<div class="video-card">'+
      '<div class="video-meta">'+
        '<span class="video-date-badge">📅 '+v.date+'</span>'+
        '<span class="video-type-badge">'+(isOfficial(v.type)?'🏆 ':'')+v.type+'</span>'+
        '<span class="video-heart" onclick="handleHeart(\''+safeName+'\',\''+safeDate+'\',\''+safeType+'\',this,event)">'+(isFav?'❤️':'🤍')+'</span>'+
      '</div>'+
      (isFav?'<div class="video-fav-label">❤️ 즐겨찾기 영상</div>':'')+
      (embedUrl
        ?'<iframe class="video-embed" src="'+embedUrl+'" allowfullscreen allow="autoplay; encrypted-media"></iframe>'
        :'<div class="video-placeholder">📹 영상을 불러올 수 없어요<br><a href="'+v.url+'" target="_blank" style="color:var(--primary);font-weight:600;margin-top:6px;display:inline-block;">직접 열기 →</a></div>')+
      '</div>';
    tl.appendChild(item);
  });
  el.appendChild(tl);
}

function handleHeart(name,date,type,heartEl,e){
  if(e)e.stopPropagation();
  var added=toggleFav(name,date,type);
  heartEl.textContent=added?'❤️':'🤍';
  var item=heartEl.closest('.video-item');
  if(item){
    var existing=item.querySelector('.video-fav-label');
    if(added&&!existing){
      var lbl=document.createElement('div');lbl.className='video-fav-label';lbl.textContent='❤️ 즐겨찾기 영상';
      var after=item.querySelector('.video-embed,.video-placeholder');
      if(after)item.querySelector('.video-card').insertBefore(lbl,after);
    }else if(!added&&existing)existing.remove();
  }
  var favContainer=el.querySelector?el.querySelector('.fav-section'):null;
  var videoContent=document.getElementById('content-video');
  if(videoContent){
    var fc=videoContent.firstChild;
    if(fc)renderFavSection(name,window._VIDEOS||[],fc);
  }
}

function showTab(tab){
  ['chart','table','calc','video'].forEach(function(t){
    var c=document.getElementById('content-'+t);
    var b=document.getElementById('tab-'+t);
    if(c)c.style.display=tab===t?'':'none';
    if(b)b.classList.toggle('active',tab===t);
  });
}

/* ── 메인 ── */
(async function(){
  var app=document.getElementById('app');
  var name=new URLSearchParams(location.search).get('name')||'';
  if(!name){app.innerHTML='<div class="error">❌ URL에 ?name=학생이름 을 추가해주세요.</div>';return;}
  try{
    var res=await fetch(CSV_URL);if(!res.ok)throw new Error('HTTP '+res.status);
    var text=await res.text();
    var rows=parseCSV(text);
    var records=parseStudent(name,rows);
    if(!records.length){app.innerHTML='<div class="error">❌ "'+name+'" 학생 데이터를 찾을 수 없습니다.</div>';return;}
    window._RECORDS=records;

    /* 영상 시트 로드 */
    var videos=[];
    try{
      var vres=await fetch(VIDEO_URL);
      if(vres.ok){var vt=await vres.text();videos=parseVideos(name,'동국대학교',parseCSV(vt));}
    }catch(ve){console.warn('영상 로드 실패:',ve);}
    window._VIDEOS=videos;

    /* DOM 구성 */
    var heroEl=document.createElement('div');
    var offEl=document.createElement('div');
    var tabWrap=document.createElement('div');tabWrap.className='tabs';
    tabWrap.innerHTML=
      '<button class="tab-btn active" id="tab-chart" onclick="showTab(\'chart\')">📈 차트</button>'+
      '<button class="tab-btn" id="tab-table" onclick="showTab(\'table\')">📋 기록표</button>'+
      '<button class="tab-btn" id="tab-calc" onclick="showTab(\'calc\')">🧮 계산기</button>'+
      '<button class="tab-btn" id="tab-video" onclick="showTab(\'video\')">🎬 영상</button>';

    var chartEl=document.createElement('div');chartEl.id='content-chart';chartEl.className='content-area';
    var tableEl=document.createElement('div');tableEl.id='content-table';tableEl.className='content-area';tableEl.style.display='none';
    var calcEl=document.createElement('div');calcEl.id='content-calc';calcEl.className='content-area';calcEl.style.display='none';
    var videoEl=document.createElement('div');videoEl.id='content-video';videoEl.className='content-area';videoEl.style.display='none';

    renderHero(records,heroEl);
    renderOfficialCard(records,offEl);
    renderChartTab(records,chartEl);
    renderTableTab(records,tableEl);
    renderCalcTab(records,calcEl);
    renderVideoTab(videos,name,videoEl);

    app.innerHTML='';
    [heroEl,offEl,tabWrap,chartEl,tableEl,calcEl,videoEl].forEach(function(e){app.appendChild(e);});
  }catch(err){app.innerHTML='<div class="error">❌ 로드 실패: '+err.message+'</div>';}
})();
</script>
</body>
</html>
