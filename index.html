<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0,maximum-scale=1.0,user-scalable=no">
<title>동국대 체교과 실기 기록</title>
<script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.0/dist/chart.umd.min.js"></script>
<style>
:root{--red:#c0392b;--orange:#e67e22;--dark:#1a1a2e;--card:#fff;--bg:#f0f2f5;--text:#2c3e50;--sub:#7f8c8d;}
*{box-sizing:border-box;margin:0;padding:0;}
body{font-family:'Apple SD Gothic Neo',Arial,sans-serif;background:var(--bg);color:var(--text);min-height:100vh;}

/* HEADER */
.header{background:linear-gradient(135deg,var(--dark) 0%,var(--red) 50%,var(--orange) 100%);padding:28px 20px;position:relative;overflow:hidden;}
.header::before{content:'';position:absolute;width:200px;height:200px;background:rgba(255,255,255,0.05);border-radius:50%;top:-60px;right:-40px;pointer-events:none;}
.header::after{content:'';position:absolute;width:140px;height:140px;background:rgba(255,255,255,0.05);border-radius:50%;bottom:-40px;left:-20px;pointer-events:none;}
.header-inner{display:flex;align-items:center;gap:20px;position:relative;z-index:1;}
.header-logo-box{flex-shrink:0;background:#fff;border-radius:18px;padding:10px 14px;box-shadow:0 6px 24px rgba(0,0,0,0.20);display:flex;align-items:center;justify-content:center;width:100px;height:100px;}
.header-logo-box img{width:100%;height:100%;object-fit:contain;}
.header-logo-text{font-size:13px;font-weight:900;color:var(--red);text-align:center;}
.header-info-col{flex:1;min-width:0;display:flex;flex-direction:column;gap:4px;}
.header-univ{color:rgba(255,255,255,0.80);font-size:12px;}
.header-name{color:#fff;font-size:30px;font-weight:900;letter-spacing:-1px;line-height:1.1;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;}
.header-school{color:rgba(255,255,255,0.80);font-size:13px;}
.header-badge{display:inline-block;background:rgba(255,255,255,0.20);color:#fff;font-size:12px;font-weight:700;padding:5px 16px;border-radius:50px;border:1.5px solid rgba(255,255,255,0.40);align-self:flex-start;margin-top:2px;}

/* TOTAL CARD */
.total-card{margin:16px 16px 0;background:linear-gradient(135deg,var(--red),var(--orange));border-radius:20px;padding:20px 24px;color:#fff;box-shadow:0 8px 32px rgba(192,57,43,0.30);}
.total-label{font-size:13px;opacity:.85;margin-bottom:4px;}
.total-score{font-size:48px;font-weight:900;letter-spacing:-2px;line-height:1;}
.total-sub{font-size:13px;opacity:.80;margin-top:4px;}
.total-breakdown{display:grid;grid-template-columns:repeat(3,1fr);gap:8px;margin-top:16px;}
.tb-item{background:rgba(255,255,255,0.15);border-radius:12px;padding:10px 8px;text-align:center;}
.tb-item .val{font-size:20px;font-weight:800;}
.tb-item .lbl{font-size:11px;opacity:.80;margin-top:2px;}

/* OFFICIAL BANNER */
.official-banner{margin:12px 16px 0;background:#fff;border-radius:16px;padding:16px;box-shadow:0 2px 12px rgba(0,0,0,0.08);border-left:4px solid var(--red);}
.ob-title{font-size:12px;color:var(--sub);margin-bottom:8px;font-weight:600;}
.ob-grid{display:grid;grid-template-columns:repeat(2,1fr);gap:8px;}
.ob-item{text-align:center;}
.ob-item .ov{font-size:18px;font-weight:800;color:var(--red);}
.ob-item .ol{font-size:11px;color:var(--sub);margin-top:2px;}

/* ACAD CARD */
.acad-card{margin:12px 16px 0;background:#fff;border-radius:16px;padding:16px;box-shadow:0 2px 12px rgba(0,0,0,0.08);}
.acad-title{font-size:13px;font-weight:700;color:var(--text);margin-bottom:10px;}
.acad-grid{display:grid;grid-template-columns:repeat(2,1fr);gap:10px;}
.acad-item{background:var(--bg);border-radius:12px;padding:12px 10px;text-align:center;}
.acad-item .av{font-size:20px;font-weight:800;color:var(--dark);}
.acad-item .al{font-size:11px;color:var(--sub);margin-top:2px;}

/* TABS */
.tabs{display:flex;margin:16px 16px 0;background:#fff;border-radius:14px;padding:4px;box-shadow:0 2px 8px rgba(0,0,0,0.06);}
.tab-btn{flex:1;padding:10px 0;border:none;background:transparent;border-radius:10px;font-size:14px;font-weight:600;color:var(--sub);cursor:pointer;transition:all .2s;}
.tab-btn.active{background:var(--red);color:#fff;}

/* EVENT CARDS */
.chart-area{padding:12px 16px 24px;}
.event-card{background:#fff;border-radius:18px;margin-bottom:14px;box-shadow:0 2px 12px rgba(0,0,0,0.07);overflow:hidden;cursor:pointer;transition:box-shadow .2s;}
.event-card:hover{box-shadow:0 4px 20px rgba(0,0,0,0.13);}
.event-card-header{display:flex;align-items:center;justify-content:space-between;padding:14px 16px 0;}
.event-badge{background:var(--red);color:#fff;font-size:11px;font-weight:700;padding:3px 10px;border-radius:20px;}
.event-toggle-icon{font-size:18px;color:var(--sub);transition:transform .3s;user-select:none;}
.event-card.open .event-toggle-icon{transform:rotate(180deg);}
.event-title{font-size:15px;font-weight:800;padding:6px 16px 0;}
.event-meta{display:flex;gap:16px;padding:4px 16px 10px;}
.event-best{font-size:13px;color:var(--sub);}
.event-achieve{font-size:13px;font-weight:700;color:var(--red);}
.progress-wrap{margin:0 16px 10px;background:var(--bg);border-radius:99px;height:6px;overflow:hidden;}
.progress-bar{height:100%;background:linear-gradient(90deg,var(--red),var(--orange));border-radius:99px;transition:width .6s;}
.chart-toggle{display:flex;gap:8px;padding:0 16px 8px;}
.ct-btn{flex:1;padding:7px 0;border:1.5px solid var(--red);border-radius:10px;background:transparent;color:var(--red);font-size:12px;font-weight:700;cursor:pointer;transition:all .2s;}
.ct-btn.active{background:var(--red);color:#fff;}
canvas{display:block;padding:0 12px 12px;}

/* DETAIL TABLE (slide-down) */
.event-detail-table{max-height:0;overflow:hidden;transition:max-height .4s ease;}
.event-card.open .event-detail-table{max-height:600px;}
.event-detail-wrap{padding:0 14px 14px;}
.event-detail-wrap table{width:100%;border-collapse:collapse;font-size:13px;}
.event-detail-wrap th{background:var(--bg);color:var(--sub);font-weight:700;padding:8px 6px;text-align:center;border-bottom:2px solid #e0e0e0;}
.event-detail-wrap td{padding:8px 6px;text-align:center;border-bottom:1px solid #f0f0f0;}
.event-detail-wrap tr:last-child td{border-bottom:none;}
.official-row td{background:#fff5f5;font-weight:700;color:var(--red);}
.official-tag{display:inline-block;background:var(--red);color:#fff;font-size:10px;padding:2px 6px;border-radius:6px;margin-left:4px;}

/* TABLE TAB */
.table-area{padding:12px 16px 24px;overflow-x:auto;}
.rec-table{width:100%;border-collapse:collapse;font-size:12px;background:#fff;border-radius:14px;overflow:hidden;box-shadow:0 2px 12px rgba(0,0,0,0.07);}
.rec-table th{background:var(--dark);color:#fff;padding:10px 8px;text-align:center;white-space:nowrap;}
.rec-table td{padding:9px 8px;text-align:center;border-bottom:1px solid #f0f0f0;white-space:nowrap;}
.rec-table tr.official-row{background:#fff0f0;}
.rec-table tr.official-row td{font-weight:700;color:var(--red);}
.tag{display:inline-block;font-size:10px;padding:2px 6px;border-radius:6px;font-weight:700;}
.tag-official{background:var(--red);color:#fff;}
.tag-monthly{background:#eee;color:#555;}

/* LOADING / ERROR */
.loading,.error{text-align:center;padding:60px 20px;font-size:15px;color:var(--sub);}
.error{color:var(--red);}
</style>
</head>
<body>
<div id="chartArea"><div class="loading">⏳ 데이터 불러오는 중...</div></div>

<script>
/* ───────────── CONSTANTS ───────────── */
const SHEET_ID  = '1-uvH7koGGIEYXO8mL56xVUbUWXEbNPVuVP3htZ2wQMY';
const SHEET_TAB = '기록데이터';
const LOGO_SRC  = 'images/dongguk.png';

const STD = {
  남:{
    strength:{max:220,min:130,unit:'kg',higher:true},
    flex:    {max:30.0,min:11.9,unit:'cm',higher:true},
    jump:    {max:300,min:254,unit:'cm',higher:true},
    run:     {max:7.19,min:9.90,unit:'초',higher:false}
  },
  여:{
    strength:{max:151,min:60,unit:'kg',higher:true},
    flex:    {max:32.0,min:13.9,unit:'cm',higher:true},
    jump:    {max:250,min:199,unit:'cm',higher:true},
    run:     {max:7.60,min:10.90,unit:'초',higher:false}
  }
};

const EVENTS = [
  {key:'strength',label:'배근력',         unit_label:'kg',ci:'1',col:8, scol:9 },
  {key:'flex',    label:'앉아윗몸앞으로굽히기',unit_label:'cm',ci:'2',col:10,scol:11},
  {key:'jump',    label:'제자리멀리뛰기',   unit_label:'cm',ci:'3',col:12,scol:13},
  {key:'run',     label:'중량달리기',       unit_label:'초',ci:'4',col:14,scol:15}
];

/* ───────────── CSV ───────────── */
const CSV_URL = `https://docs.google.com/spreadsheets/d/${SHEET_ID}/gviz/tq?tqx=out:csv&sheet=${encodeURIComponent(SHEET_TAB)}`;

function parseCSV(text){
  const rows=[];
  const re=/("(?:[^"]|"")*"|[^,\n\r]*)/g;
  let row=[];
  let m;
  while((m=re.exec(text))!==null){
    let v=m[1];
    if(v.startsWith('"')&&v.endsWith('"'))v=v.slice(1,-1).replace(/""/g,'"');
    row.push(v.trim());
    const next=text[re.lastIndex];
    if(next==='\n'||next==='\r'||re.lastIndex>=text.length){rows.push(row);row=[];if(next==='\r'&&text[re.lastIndex+1]==='\n')re.lastIndex++;}
    else if(next===',')re.lastIndex++;
  }
  return rows;
}

function parseVal(v){if(!v||v.trim()==='')return null;const n=parseFloat(v.replace(/,/g,''));return isNaN(n)?null:n;}

function parseStudent(name,rows){
  const records=[];
  for(let i=1;i<rows.length;i++){
    const r=rows[i];
    if(!r||r.length<2)continue;
    if((r[2]||'').trim()!==name)continue;
    const gender=(r[3]||'').trim();
    const gKey=gender==='여'?'여':'남';
    const std=STD[gKey];
    const makeScore=(key,raw)=>{
      if(raw===null)return null;
      const s=std[key];
      if(s.higher){if(raw>=s.max)return 100;if(raw<=s.min)return 0;return Math.round((raw-s.min)/(s.max-s.min)*100*100)/100;}
      else{if(raw<=s.max)return 100;if(raw>=s.min)return 0;return Math.round((s.min-raw)/(s.min-s.max)*100*100)/100;}
    };
    const strVal=parseVal(r[8]);
    const flexVal=parseVal(r[10]);
    const jumpVal=parseVal(r[12]);
    const runVal=parseVal(r[14]);
    const acadVal=parseVal(r[7]);
    const totalVal=parseVal(r[16]);
    records.push({
      type:(r[0]||'').trim(),
      date:(r[1]||'').trim(),
      name:(r[2]||'').trim(),
      gender:gKey,
      school:(r[4]||'').trim(),
      univ:(r[5]||'').trim(),
      dept:(r[6]||'').trim(),
      acad:acadVal,
      strength:strVal, strScore:parseVal(r[9])??makeScore('strength',strVal),
      flex:flexVal,    flexScore:parseVal(r[11])??makeScore('flex',flexVal),
      jump:jumpVal,    jumpScore:parseVal(r[13])??makeScore('jump',jumpVal),
      run:runVal,      runScore:parseVal(r[15])??makeScore('run',runVal),
      total:totalVal
    });
  }
  records.sort((a,b)=>{
    const da=a.date.replace(/\./g,'');
    const db=b.date.replace(/\./g,'');
    return da<db?-1:da>db?1:0;
  });
  return records;
}

/* ───────────── RENDER ───────────── */
let CHARTS={};

function renderHeader(r,el){
  const first=r[0]||{};
  el.innerHTML=`
  <div class="header">
    <div class="header-inner">
      <div class="header-logo-box">
        <img src="${LOGO_SRC}" alt="로고" onerror="this.style.display='none';this.nextElementSibling.style.display='block'">
        <span class="header-logo-text" style="display:none">${first.univ||'대학교'}</span>
      </div>
      <div class="header-info-col">
        <div class="header-univ">${first.univ||''} · ${first.dept||''}</div>
        <div class="header-name">${first.name||''}</div>
        <div class="header-school">${first.school||''}</div>
        <div class="header-badge">${first.gender==='여'?'여자':'남자'}</div>
      </div>
    </div>
  </div>`;
}

function renderTotalCard(r,el){
  const official=r.filter(x=>x.type==='공식테스트');
  const last=official.length?official[official.length-1]:r[r.length-1];
  if(!last){el.innerHTML='';return;}
  const acad=last.acad??0;
  const events=[last.strScore,last.flexScore,last.jumpScore,last.runScore];
  const allHave=events.every(v=>v!==null);
  let total=last.total;
  if(total===null&&allHave){
    const sum=events.reduce((a,b)=>a+b,0);
    total=Math.round((acad+sum*1.75)*100)/100;
  }
  const scoreSum=allHave?events.reduce((a,b)=>a+b,0):null;
  el.innerHTML=`
  <div class="total-card">
    <div class="total-label">최종 총점 (내신환산 + 실기×1.75)</div>
    <div class="total-score">${total!==null?total.toFixed(2):'—'}</div>
    <div class="total-sub">내신환산 ${acad.toFixed(2)} + 실기합 ${scoreSum!==null?scoreSum.toFixed(2):'—'} × 1.75</div>
    <div class="total-breakdown">
      <div class="tb-item"><div class="val">${last.strScore!==null?last.strScore.toFixed(2):'—'}</div><div class="lbl">배근력 점수</div></div>
      <div class="tb-item"><div class="val">${last.flexScore!==null?last.flexScore.toFixed(2):'—'}</div><div class="lbl">좌전굴 점수</div></div>
      <div class="tb-item"><div class="val">${last.jumpScore!==null?last.jumpScore.toFixed(2):'—'}</div><div class="lbl">멀리뛰기 점수</div></div>
      <div class="tb-item"><div class="val">${last.runScore!==null?last.runScore.toFixed(2):'—'}</div><div class="lbl">달리기 점수</div></div>
      <div class="tb-item"><div class="val">${acad.toFixed(2)}</div><div class="lbl">내신환산</div></div>
      <div class="tb-item"><div class="val">${total!==null?total.toFixed(2):'—'}</div><div class="lbl">총점</div></div>
    </div>
  </div>`;
}

function renderOfficialBanner(r,el){
  const off=r.filter(x=>x.type==='공식테스트');
  if(!off.length){el.innerHTML='';return;}
  const last=off[off.length-1];
  el.innerHTML=`
  <div class="official-banner">
    <div class="ob-title">📋 공식 테스트 최신 기록 (${last.date})</div>
    <div class="ob-grid">
      <div class="ob-item"><div class="ov">${last.strength??'—'} <small>kg</small></div><div class="ol">배근력</div></div>
      <div class="ob-item"><div class="ov">${last.flex??'—'} <small>cm</small></div><div class="ol">좌전굴</div></div>
      <div class="ob-item"><div class="ov">${last.jump??'—'} <small>cm</small></div><div class="ol">멀리뛰기</div></div>
      <div class="ob-item"><div class="ov">${last.run??'—'} <small>초</small></div><div class="ol">달리기</div></div>
    </div>
  </div>`;
}

function renderAcadCard(r,el){
  const off=r.filter(x=>x.type==='공식테스트');
  const last=off.length?off[off.length-1]:r[r.length-1];
  if(!last||last.acad===null){el.innerHTML='';return;}
  const acad=last.acad;
  el.innerHTML=`
  <div class="acad-card">
    <div class="acad-title">📚 내신환산 점수</div>
    <div class="acad-grid">
      <div class="acad-item"><div class="av">${acad.toFixed(2)}</div><div class="al">내신환산 점수</div></div>
      <div class="acad-item"><div class="av">${((acad/300)*100).toFixed(1)}%</div><div class="al">내신 달성률 (300점 기준)</div></div>
    </div>
  </div>`;
}

function buildDetailTable(records,key,label,unit){
  if(!records.length)return '<p style="text-align:center;padding:12px;color:#aaa">기록 없음</p>';
  const rows=records.map(rec=>{
    const valMap={strength:rec.strength,flex:rec.flex,jump:rec.jump,run:rec.run};
    const sMap={strength:rec.strScore,flex:rec.flexScore,jump:rec.jumpScore,run:rec.runScore};
    const v=valMap[key];const s=sMap[key];
    const isOff=rec.type==='공식테스트';
    return `<tr class="${isOff?'official-row':''}">
      <td>${rec.date}${isOff?'<span class="official-tag">공식</span>':''}</td>
      <td>${v!==null?v+' '+unit:'—'}</td>
      <td>${s!==null?s.toFixed(2):'—'}</td>
    </tr>`;
  }).join('');
  return `<div class="event-detail-wrap"><table>
    <thead><tr><th>날짜</th><th>기록</th><th>환산점수</th></tr></thead>
    <tbody>${rows}</tbody>
  </table></div>`;
}

function renderChartTab(records,el){
  Object.values(CHARTS).forEach(c=>c.destroy());CHARTS={};
  const keyMap={strength:'strScore',flex:'flexScore',jump:'jumpScore',run:'runScore'};
  const rawMap={strength:'strength',flex:'flex',jump:'jump',run:'run'};
  const unitMap={strength:'kg',flex:'cm',jump:'cm',run:'초'};
  let html='<div class="chart-area">';
  EVENTS.forEach(ev=>{
    const scores=records.map(x=>x[keyMap[ev.key]]);
    const best=Math.max(...scores.filter(s=>s!==null));
    const latest=scores.filter(s=>s!==null).slice(-1)[0]??0;
    const pct=Math.min(100,Math.round(latest));
    const detail=buildDetailTable(records,ev.key,ev.label,unitMap[ev.key]);
    html+=`
    <div class="event-card" id="card-${ev.key}" onclick="toggleCard('${ev.key}',event)">
      <div class="event-card-header">
        <span class="event-badge">종목 ${ev.ci}</span>
        <span class="event-toggle-icon" id="icon-${ev.key}">▼</span>
      </div>
      <div class="event-title">${ev.label}</div>
      <div class="event-meta">
        <span class="event-best">최고 ${best!==null&&isFinite(best)?best.toFixed(2):'—'} 점</span>
        <span class="event-achieve">달성률 ${pct}%</span>
      </div>
      <div class="progress-wrap"><div class="progress-bar" style="width:${pct}%"></div></div>
      <div class="chart-toggle">
        <button class="ct-btn active" id="btn-line-${ev.key}" onclick="switchChartType('${ev.key}','line',event)">꺾은선</button>
        <button class="ct-btn" id="btn-bar-${ev.key}" onclick="switchChartType('${ev.key}','bar',event)">막대</button>
      </div>
      <canvas id="canvas-${ev.key}" height="160"></canvas>
      <div class="event-detail-table" id="detail-${ev.key}">${detail}</div>
    </div>`;
  });
  html+='</div>';
  el.innerHTML=html;
  EVENTS.forEach(ev=>{buildChart(ev.key,records,keyMap[ev.key],'line');});
}

function buildChart(key,records,scoreKey,type){
  const ctx=document.getElementById('canvas-'+key);
  if(!ctx)return;
  if(CHARTS[key])CHARTS[key].destroy();
  const labels=records.map(r=>r.date);
  const data=records.map(r=>r[scoreKey]);
  const isOff=records.map(r=>r.type==='공식테스트');
  const ptColors=isOff.map(o=>o?'#c0392b':'#e67e22');
  const ptRadius=isOff.map(o=>o?7:4);
  CHARTS[key]=new Chart(ctx,{
    type,
    data:{
      labels,
      datasets:[{
        label:'환산점수',data,
        borderColor:'#c0392b',backgroundColor:type==='bar'?'rgba(192,57,43,0.7)':'rgba(192,57,43,0.15)',
        fill:type==='line',tension:0.3,
        pointBackgroundColor:ptColors,pointRadius:ptRadius,pointBorderWidth:2,pointBorderColor:'#fff'
      }]
    },
    options:{responsive:true,plugins:{legend:{display:false}},scales:{y:{min:0,max:100,ticks:{stepSize:20}}}}
  });
}

function switchChartType(key,type,e){
  e.stopPropagation();
  ['line','bar'].forEach(t=>{
    const b=document.getElementById(`btn-${t}-${key}`);
    if(b)b.classList.toggle('active',t===type);
  });
  const records=window._RECORDS||[];
  const keyMap={strength:'strScore',flex:'flexScore',jump:'jumpScore',run:'runScore'};
  buildChart(key,records,keyMap[key],type);
}

function toggleCard(key,e){
  if(e.target.closest('.chart-toggle'))return;
  const card=document.getElementById('card-'+key);
  if(card)card.classList.toggle('open');
}

function renderTableTab(records,el){
  let rows=records.map(r=>{
    const acad=r.acad??0;
    const events=[r.strScore,r.flexScore,r.jumpScore,r.runScore];
    const allHave=events.every(v=>v!==null);
    let tot=r.total;
    if(tot===null&&allHave)tot=Math.round((acad+events.reduce((a,b)=>a+b,0)*1.75)*100)/100;
    const isOff=r.type==='공식테스트';
    return `<tr class="${isOff?'official-row':''}">
      <td><span class="tag ${isOff?'tag-official':'tag-monthly'}">${r.type}</span></td>
      <td>${r.date}</td>
      <td>${r.strength??'—'}</td><td>${r.strScore!==null?r.strScore.toFixed(2):'—'}</td>
      <td>${r.flex??'—'}</td><td>${r.flexScore!==null?r.flexScore.toFixed(2):'—'}</td>
      <td>${r.jump??'—'}</td><td>${r.jumpScore!==null?r.jumpScore.toFixed(2):'—'}</td>
      <td>${r.run??'—'}</td><td>${r.runScore!==null?r.runScore.toFixed(2):'—'}</td>
      <td>${r.acad!==null?r.acad.toFixed(2):'—'}</td>
      <td><strong>${tot!==null?tot.toFixed(2):'—'}</strong></td>
    </tr>`;
  }).join('');
  el.innerHTML=`<div class="table-area"><table class="rec-table">
    <thead><tr>
      <th>구분</th><th>날짜</th>
      <th>배근력</th><th>점수</th>
      <th>좌전굴</th><th>점수</th>
      <th>멀리뛰기</th><th>점수</th>
      <th>달리기</th><th>점수</th>
      <th>내신환산</th><th>총점</th>
    </tr></thead>
    <tbody>${rows}</tbody>
  </table></div>`;
}

/* ───────────── MAIN ───────────── */
(async()=>{
  const app=document.getElementById('chartArea');
  const name=new URLSearchParams(location.search).get('name')||'';
  if(!name){app.innerHTML='<div class="error">❌ URL에 ?name=학생이름 을 추가해주세요.</div>';return;}
  try{
    const res=await fetch(CSV_URL);
    if(!res.ok)throw new Error('fetch failed');
    const text=await res.text();
    const rows=parseCSV(text);
    const records=parseStudent(name,rows);
    if(!records.length){app.innerHTML=`<div class="error">❌ "${name}" 학생 데이터를 찾을 수 없습니다.</div>`;return;}
    window._RECORDS=records;

    const header=document.createElement('div');
    const totalCard=document.createElement('div');
    const officialBanner=document.createElement('div');
    const acadCard=document.createElement('div');
    const tabWrap=document.createElement('div');tabWrap.className='tabs';
    tabWrap.innerHTML=`<button class="tab-btn active" id="tab-chart" onclick="showTab('chart')">📈 차트</button><button class="tab-btn" id="tab-table" onclick="showTab('table')">📋 기록표</button>`;
    const chartContent=document.createElement('div');chartContent.id='content-chart';
    const tableContent=document.createElement('div');tableContent.id='content-table';tableContent.style.display='none';

    renderHeader(records,header);
    renderTotalCard(records,totalCard);
    renderOfficialBanner(records,officialBanner);
    renderAcadCard(records,acadCard);
    renderChartTab(records,chartContent);
    renderTableTab(records,tableContent);

    app.innerHTML='';
    [header,totalCard,officialBanner,acadCard,tabWrap,chartContent,tableContent].forEach(el=>app.appendChild(el));

    window.showTab=function(tab){
      document.getElementById('content-chart').style.display=tab==='chart'?'':'none';
      document.getElementById('content-table').style.display=tab==='table'?'':'none';
      document.getElementById('tab-chart').classList.toggle('active',tab==='chart');
      document.getElementById('tab-table').classList.toggle('active',tab==='table');
    };
  }catch(err){
    app.innerHTML=`<div class="error">❌ 데이터 로드 실패: ${err.message}</div>`;
  }
})();
</script>
</body>
</html>
