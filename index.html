<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>동국대 체교과 실기 기록</title>
<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
<style>
* { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }

:root {
  --red:     #D4341A;
  --orange:  #E8621A;
  --yellow:  #F5A623;
  --dark:    #C44B0F;
  --text:    #1a1a1a;
  --subtext: #888;
  --bg:      #f7f3f0;
  --white:   #ffffff;
  --shadow:  0 4px 24px rgba(0,0,0,0.08);
}

body {
  font-family: 'Apple SD Gothic Neo', 'Noto Sans KR', sans-serif;
  background: var(--bg);
  min-height: 100vh;
  max-width: 480px;
  margin: 0 auto;
}

/* ══ 헤더 ══ */
.header {
  background: linear-gradient(145deg, #b33a10 0%, var(--red) 35%, var(--orange) 70%, var(--yellow) 100%);
  color: white;
  padding: 52px 24px 36px;
  text-align: center;
  position: relative;
  overflow: hidden;
}
.header-circle1 {
  position: absolute;
  width: 200px; height: 200px;
  border-radius: 50%;
  background: rgba(255,255,255,0.05);
  top: -60px; right: -40px;
}
.header-circle2 {
  position: absolute;
  width: 140px; height: 140px;
  border-radius: 50%;
  background: rgba(255,255,255,0.05);
  bottom: -50px; left: -30px;
}
.header-univ {
  font-size: 11px;
  letter-spacing: 2.5px;
  opacity: 0.85;
  font-weight: 700;
  margin-bottom: 12px;
  text-transform: uppercase;
  position: relative;
}
.header-name {
  font-size: 34px;
  font-weight: 900;
  letter-spacing: -1px;
  margin-bottom: 8px;
  position: relative;
}
.header-info {
  font-size: 14px;
  opacity: 0.85;
  margin-bottom: 16px;
  position: relative;
}
.header-badge {
  display: inline-flex;
  align-items: center;
  gap: 6px;
  padding: 7px 18px;
  background: rgba(255,255,255,0.2);
  border-radius: 999px;
  font-size: 13px;
  font-weight: 700;
  backdrop-filter: blur(8px);
  position: relative;
}

/* ══ 탭 ══ */
.tab-wrap {
  background: white;
  display: flex;
  box-shadow: 0 2px 12px rgba(0,0,0,0.07);
  position: sticky;
  top: 0;
  z-index: 100;
}
.tab-btn {
  flex: 1;
  padding: 17px 0;
  text-align: center;
  font-size: 14px;
  font-weight: 700;
  color: #ccc;
  cursor: pointer;
  border: none;
  border-bottom: 3px solid transparent;
  background: none;
  transition: all 0.25s;
  letter-spacing: -0.3px;
}
.tab-btn.active {
  color: var(--red);
  border-bottom: 3px solid var(--red);
}

/* ══ 컨테이너 ══ */
.container { padding: 20px 16px 80px; }

/* ══ 총점 카드 ══ */
.total-card {
  background: linear-gradient(135deg, #1a1a2e, #2d1b0e);
  border-radius: 24px;
  padding: 24px 22px;
  color: white;
  margin-bottom: 16px;
  box-shadow: 0 8px 32px rgba(0,0,0,0.2);
  position: relative;
  overflow: hidden;
}
.total-card::before {
  content: '';
  position: absolute;
  width: 180px; height: 180px;
  border-radius: 50%;
  background: rgba(212,52,26,0.15);
  top: -60px; right: -40px;
}
.total-card::after {
  content: '';
  position: absolute;
  width: 120px; height: 120px;
  border-radius: 50%;
  background: rgba(245,166,35,0.1);
  bottom: -40px; left: -20px;
}
.total-label {
  font-size: 11px;
  opacity: 0.6;
  letter-spacing: 2px;
  font-weight: 700;
  margin-bottom: 6px;
  position: relative;
}
.total-row {
  display: flex;
  align-items: flex-end;
  justify-content: space-between;
  position: relative;
}
.total-score {
  font-size: 52px;
  font-weight: 900;
  letter-spacing: -2px;
  line-height: 1;
  background: linear-gradient(135deg, #fff, #ffd89b);
  -webkit-background-clip: text;
  -webkit-text-fill-color: transparent;
}
.total-max {
  font-size: 16px;
  opacity: 0.5;
  margin-bottom: 8px;
  margin-left: 4px;
}
.total-right { text-align: right; position: relative; }
.total-grade-label { font-size: 11px; opacity: 0.6; margin-bottom: 4px; }
.total-grade {
  font-size: 32px;
  font-weight: 900;
  background: linear-gradient(135deg, var(--orange), var(--yellow));
  -webkit-background-clip: text;
  -webkit-text-fill-color: transparent;
}
.total-inner-label { font-size: 11px; opacity: 0.5; margin-top: 2px; }

/* ══ 공식테스트 배너 ══ */
.official-banner {
  background: linear-gradient(135deg, var(--dark) 0%, var(--red) 50%, var(--orange) 100%);
  border-radius: 24px;
  padding: 24px 20px;
  color: white;
  margin-bottom: 16px;
  position: relative;
  overflow: hidden;
  box-shadow: 0 8px 32px rgba(212,52,26,0.3);
}
.official-banner::before {
  content: '🏅';
  position: absolute;
  right: 18px; top: 16px;
  font-size: 48px;
  opacity: 0.2;
}
.ob-label {
  font-size: 10px;
  opacity: 0.8;
  letter-spacing: 2.5px;
  font-weight: 700;
  margin-bottom: 4px;
}
.ob-title {
  font-size: 19px;
  font-weight: 800;
  margin-bottom: 4px;
}
.ob-date {
  font-size: 13px;
  opacity: 0.75;
  margin-bottom: 20px;
}
.ob-grid {
  display: grid;
  grid-template-columns: 1fr 1fr;
  gap: 10px;
}
.ob-item {
  background: rgba(255,255,255,0.15);
  border-radius: 16px;
  padding: 14px 12px;
  backdrop-filter: blur(4px);
}
.ob-item-label { font-size: 11px; opacity: 0.8; margin-bottom: 6px; font-weight: 600; }
.ob-item-value { font-size: 22px; font-weight: 800; line-height: 1; }
.ob-item-unit  { font-size: 12px; opacity: 0.7; margin-left: 2px; }
.ob-item-score {
  margin-top: 8px;
  display: inline-block;
  background: rgba(255,255,255,0.22);
  border-radius: 999px;
  padding: 3px 10px;
  font-size: 12px;
  font-weight: 700;
}
.ob-item-pct {
  font-size: 11px;
  opacity: 0.75;
  margin-top: 4px;
}

/* ══ 섹션 타이틀 ══ */
.section-title {
  font-size: 12px;
  font-weight: 800;
  color: #bbb;
  letter-spacing: 2px;
  text-transform: uppercase;
  margin: 24px 0 14px;
}

/* ══ 종목 카드 ══ */
.event-card {
  background: white;
  border-radius: 24px;
  padding: 22px 20px;
  margin-bottom: 14px;
  box-shadow: var(--shadow);
}
.event-header {
  display: flex;
  align-items: center;
  margin-bottom: 20px;
}
.event-icon {
  width: 50px; height: 50px;
  border-radius: 16px;
  display: flex; align-items: center; justify-content: center;
  font-size: 26px;
  margin-right: 14px;
  flex-shrink: 0;
}
.event-title { font-size: 16px; font-weight: 800; color: var(--text); margin-bottom: 3px; }
.event-meta  { font-size: 12px; color: #ccc; }

/* ══ 스탯 ══ */
.stat-row {
  display: flex;
  justify-content: space-between;
  align-items: flex-end;
  margin-bottom: 16px;
}
.stat-label  { font-size: 11px; color: #bbb; font-weight: 600; margin-bottom: 5px; }
.stat-value  { font-size: 38px; font-weight: 900; color: var(--text); line-height: 1; letter-spacing: -1px; }
.stat-unit   { font-size: 16px; color: #ccc; font-weight: 500; margin-left: 3px; }
.stat-right  { text-align: right; }
.stat-pct-label { font-size: 11px; color: #bbb; margin-bottom: 3px; }
.stat-pct    { font-size: 30px; font-weight: 900; }

/* ══ 프로그레스바 ══ */
.progress-wrap {
  background: #f0ece8;
  border-radius: 999px;
  height: 10px;
  margin-bottom: 8px;
  overflow: hidden;
}
.progress-bar {
  height: 100%;
  border-radius: 999px;
  transition: width 1.4s cubic-bezier(0.4,0,0.2,1);
  position: relative;
}
.progress-meta {
  display: flex;
  justify-content: space-between;
  font-size: 11px;
  color: #ccc;
  margin-bottom: 18px;
}

/* ══ 차트 타입 탭 ══ */
.chart-type-tabs {
  display: flex;
  gap: 8px;
  margin-bottom: 14px;
}
.chart-type-btn {
  flex: 1;
  padding: 9px;
  border-radius: 12px;
  font-size: 12px;
  font-weight: 700;
  text-align: center;
  cursor: pointer;
  border: 2px solid #f0ece8;
  background: white;
  color: #ccc;
  transition: all 0.2s;
}
.chart-type-btn.active {
  border-color: var(--red);
  color: var(--red);
  background: #fff5f2;
}
.chart-wrap { height: 190px; position: relative; }

/* ══ 기록표 ══ */
.table-card {
  background: white;
  border-radius: 24px;
  overflow: hidden;
  box-shadow: var(--shadow);
  margin-bottom: 16px;
}
.table-wrap { overflow-x: auto; -webkit-overflow-scrolling: touch; }
table { width: 100%; border-collapse: collapse; }
th {
  background: #fdf5f2;
  color: #aaa;
  font-weight: 700;
  padding: 13px 8px;
  text-align: center;
  border-bottom: 2px solid #f5ede8;
  white-space: nowrap;
  font-size: 11px;
  letter-spacing: 0.5px;
}
td {
  padding: 13px 8px;
  text-align: center;
  border-bottom: 1px solid #faf5f2;
  color: var(--text);
  font-size: 13px;
  font-weight: 500;
}
tr:last-child td { border-bottom: none; }
.official-row td {
  background: linear-gradient(135deg,rgba(212,52,26,0.04),rgba(245,166,35,0.04));
  color: var(--red);
  font-weight: 700;
}
.tag {
  display: inline-block;
  font-size: 9px;
  padding: 2px 6px;
  border-radius: 5px;
  margin-left: 3px;
  font-weight: 800;
  letter-spacing: 0.3px;
}
.tag-official { background: var(--red); color: white; }
.tag-monthly  { background: #f5ede8; color: var(--orange); }

/* ══ 아이콘 배경 ══ */
.ic1 { background: linear-gradient(135deg,#fff0ec,#ffddd5); }
.ic2 { background: linear-gradient(135deg,#fff6ec,#ffebd0); }
.ic3 { background: linear-gradient(135deg,#fffaec,#fff0c0); }
.ic4 { background: linear-gradient(135deg,#ffecea,#ffd5d0); }

/* ══ 프로그레스바 색상 ══ */
.pb1 { background: linear-gradient(90deg,#b33a10,var(--red)); }
.pb2 { background: linear-gradient(90deg,var(--red),var(--orange)); }
.pb3 { background: linear-gradient(90deg,var(--orange),var(--yellow)); }
.pb4 { background: linear-gradient(90deg,#b33a10,var(--orange)); }

/* ══ 달성률 색상 ══ */
.ap1 { color: var(--dark);   }
.ap2 { color: var(--red);    }
.ap3 { color: var(--orange); }
.ap4 { color: #d4860f;       }

/* ══ 로딩 ══ */
.loading {
  text-align: center;
  padding: 100px 20px;
  color: #ddd;
  font-size: 15px;
  line-height: 2.2;
}
.tab-content { display: none; }
.tab-content.active { display: block; }
</style>
</head>
<body>

<!-- 헤더 -->
<div class="header">
  <div class="header-circle1"></div>
  <div class="header-circle2"></div>
  <div class="header-univ">Dongguk University · 체육교육과</div>
  <div class="header-name" id="hName">···</div>
  <div class="header-info" id="hInfo"></div>
  <div class="header-badge" id="hBadge"></div>
</div>

<!-- 탭 -->
<div class="tab-wrap">
  <button class="tab-btn active" onclick="switchTab('chart')">📊 차트</button>
  <button class="tab-btn"        onclick="switchTab('table')">📋 기록표</button>
</div>

<div class="container">
  <div class="tab-content active" id="tab-chart">
    <div id="chartArea"><div class="loading">⏳ 불러오는 중...</div></div>
  </div>
  <div class="tab-content" id="tab-table">
    <div id="tableArea"></div>
  </div>
</div>

<script>
// ════════════════════════════
//  설정
// ════════════════════════════
const SHEET_ID  = '1-uvH7koGGIEYXO8mL56xVUbUWXEbNPVuVP3htZ2wQMY';
const SHEET_TAB = '기록데이터';

const STD = {
  남: {
    strength:{ max:220,  min:130,  unit:'kg', higher:true  },
    flex:    { max:30.0, min:11.9, unit:'cm', higher:true  },
    jump:    { max:300,  min:254,  unit:'cm', higher:true  },
    run:     { max:7.19, min:9.90, unit:'초',  higher:false }
  },
  여: {
    strength:{ max:151,  min:60,   unit:'kg', higher:true  },
    flex:    { max:32.0, min:13.9, unit:'cm', higher:true  },
    jump:    { max:250,  min:199,  unit:'cm', higher:true  },
    run:     { max:7.60, min:10.90,unit:'초',  higher:false }
  }
};

const EVENTS = [
  { key:'strength', label:'배근력',                  icon:'💪', ci:'1', col:6,  scol:7  },
  { key:'flex',     label:'앉아 윗몸 앞으로 굽히기',  icon:'🧘', ci:'2', col:8,  scol:9  },
  { key:'jump',     label:'제자리 멀리뛰기',          icon:'🦘', ci:'3', col:10, scol:11 },
  { key:'run',      label:'중량달리기',               icon:'🏃', ci:'4', col:12, scol:13 }
];

const LINE_C = [
  { line:'#C44B0F', fill:'rgba(196,75,15,0.07)'  },
  { line:'#D4341A', fill:'rgba(212,52,26,0.07)'  },
  { line:'#E8621A', fill:'rgba(232,98,26,0.07)'  },
  { line:'#F5A623', fill:'rgba(245,166,35,0.07)' }
];
const BAR_C = [
  'rgba(196,75,15,0.75)',
  'rgba(212,52,26,0.75)',
  'rgba(232,98,26,0.75)',
  'rgba(245,166,35,0.75)'
];

// ════════════════════════════
//  URL 파라미터
// ════════════════════════════
const params  = new URLSearchParams(window.location.search);
const urlName = params.get('name') || '';
let chartInst = {};

// ════════════════════════════
//  데이터 로드
// ════════════════════════════
const CSV_URL = `https://docs.google.com/spreadsheets/d/${SHEET_ID}/gviz/tq?tqx=out:csv&sheet=${encodeURIComponent(SHEET_TAB)}`;

fetch(CSV_URL)
  .then(r => r.text())
  .then(csv => {
    const rows = parseCSV(csv);
    const data = parseStudent(rows, urlName);
    if (!data) {
      document.getElementById('chartArea').innerHTML =
        `<div class="loading">❌ "${urlName}" 데이터를 찾을 수 없어요.</div>`;
      return;
    }
    renderHeader(data);
    renderChart(data);
    renderTable(data);
  })
  .catch(() => {
    document.getElementById('chartArea').innerHTML =
      '<div class="loading">❌ 데이터를 불러올 수 없어요.<br>시트 공개 설정을 확인해주세요.</div>';
  });

// ════════════════════════════
//  CSV 파싱
// ════════════════════════════
function parseCSV(text) {
  return text.trim().split('\n').map(line => {
    const res = []; let cur = '', inQ = false;
    for (let ch of line) {
      if (ch === '"') inQ = !inQ;
      else if (ch === ',' && !inQ) { res.push(cur.trim()); cur = ''; }
      else cur += ch;
    }
    res.push(cur.trim());
    return res;
  });
}

// ════════════════════════════
//  학생 데이터 파싱
// ════════════════════════════
function parseStudent(rows, name) {
  const official = [], monthly = [];
  let gender = '', school = '';

  for (let i = 1; i < rows.length; i++) {
    const r = rows[i];
    if (!r[0] || !r[2]) continue;
    if (r[2] !== name) continue;

    gender = r[3] || '남';
    school = r[4] || '';

    const item = {
      date:      r[1]  || '',
      naeshin:   r[5]  || '',
      strength:  r[6]  === '미응시' ? '미응시' : (parseFloat(r[6])  || null),
      strScore:  r[7]  || '',
      flex:      r[8]  === '미응시' ? '미응시' : (parseFloat(r[8])  || null),
      flxScore:  r[9]  || '',
      jump:      r[10] === '미응시' ? '미응시' : (parseFloat(r[10]) || null),
      jmpScore:  r[11] || '',
      run:       r[12] === '미응시' ? '미응시' : (parseFloat(r[12]) || null),
      runScore:  r[13] || '',
      total:     r[14] || ''
    };

    if (r[0].includes('공식')) official.push(item);
    else monthly.push(item);
  }

  if (!official.length && !monthly.length) return null;
  monthly.sort((a,b) => a.date.localeCompare(b.date));
  return { name, gender, school, official, monthly };
}

// ════════════════════════════
//  헤더
// ════════════════════════════
function renderHeader(data) {
  document.title = data.name + '님의 실기 기록';
  document.getElementById('hName').textContent = data.name;
  document.getElementById('hInfo').textContent = data.school;
  const b = document.getElementById('hBadge');
  b.textContent = data.gender === '남' ? '🧑 남성' : '👩 여성';
}

// ════════════════════════════
//  탭 전환
// ════════════════════════════
function switchTab(name) {
  document.querySelectorAll('.tab-btn').forEach((b,i) =>
    b.classList.toggle('active', ['chart','table'][i] === name));
  document.querySelectorAll('.tab-content').forEach(c =>
    c.classList.remove('active'));
  document.getElementById('tab-' + name).classList.add('active');
}

// ════════════════════════════
//  차트 탭
// ════════════════════════════
function renderChart(data) {
  const area = document.getElementById('chartArea');
  area.innerHTML = '';
  const std = STD[data.gender] || STD['남'];

  // 최근 총점 카드
  const latestOfficial = data.official[data.official.length - 1];
  if (latestOfficial && latestOfficial.total) {
    const totalScore = parseFloat(latestOfficial.total) || 0;
    const maxTotal   = 400;
    const pct        = Math.round(totalScore / maxTotal * 100);
    const tc = document.createElement('div');
    tc.className = 'total-card';
    tc.innerHTML = `
      <div class="total-label">OFFICIAL TOTAL SCORE</div>
      <div class="total-row">
        <div>
          <span class="total-score">${totalScore.toFixed(2)}</span>
          <span class="total-max">/ ${maxTotal}</span>
        </div>
        <div class="total-right">
          <div class="total-grade-label">달성률</div>
          <div class="total-grade">${pct}%</div>
          <div class="total-inner-label">${latestOfficial.date}</div>
        </div>
      </div>`;
    area.appendChild(tc);
  }

  // 공식테스트 배너
  if (latestOfficial) {
    const ov = latestOfficial;
    const ob = document.createElement('div');
    ob.className = 'official-banner';
    ob.innerHTML = `
      <div class="ob-label">OFFICIAL TEST</div>
      <div class="ob-title">공식 테스트 기록</div>
      <div class="ob-date">📅 ${ov.date}</div>
      <div class="ob-grid">
        ${makeOB('💪','배근력',   ov.strength,'kg', ov.strScore, std.strength)}
        ${makeOB('🧘','좌전굴',   ov.flex,    'cm', ov.flxScore, std.flex)}
        ${makeOB('🦘','멀리뛰기', ov.jump,    'cm', ov.jmpScore, std.jump)}
        ${makeOB('🏃','달리기',   ov.run,     '초',  ov.runScore, std.run)}
      </div>`;
    area.appendChild(ob);
  }

  // 월별 섹션
  const st = document.createElement('div');
  st.className = 'section-title';
  st.textContent = 'Monthly Training';
  area.appendChild(st);

  const labels = data.monthly.map(r => r.date);

  EVENTS.forEach((ev, idx) => {
    const rawVals = data.monthly.map(r => r[ev.key]);
    const numVals = rawVals.map(v => (v === '미응시' || v === null) ? null : v);
    const valid   = numVals.filter(v => v !== null);
    if (valid.length === 0) return;

    const st2  = std[ev.key];
    const best = st2.higher ? Math.max(...valid) : Math.min(...valid);
    let pct = st2.higher
      ? Math.round((best - st2.min) / (st2.max - st2.min) * 100)
      : Math.round((st2.min - best) / (st2.min - st2.max) * 100);
    pct = Math.max(0, Math.min(100, pct));

    const card = document.createElement('div');
    card.className = 'event-card';
    card.innerHTML = `
      <div class="event-header">
        <div class="event-icon ic${ev.ci}">${ev.icon}</div>
        <div>
          <div class="event-title">${ev.label}</div>
          <div class="event-meta">단위: ${st2.unit} &nbsp;·&nbsp; 만점기준: ${st2.max}${st2.unit}</div>
        </div>
      </div>
      <div class="stat-row">
        <div>
          <div class="stat-label">월별 최고기록</div>
          <span class="stat-value">${best}</span>
          <span class="stat-unit">${st2.unit}</span>
        </div>
        <div class="stat-right">
          <div class="stat-pct-label">만점 달성률</div>
          <div class="stat-pct ap${ev.ci}">${pct}%</div>
        </div>
      </div>
      <div class="progress-wrap">
        <div class="progress-bar pb${ev.ci}" id="pb_${ev.key}" style="width:0%"></div>
      </div>
      <div class="progress-meta">
        <span>최저 ${st2.min}${st2.unit}</span>
        <span>만점 ${st2.max}${st2.unit}</span>
      </div>
      <div class="chart-type-tabs">
        <div class="chart-type-btn active" id="lt_${ev.key}" onclick="switchChartType('${ev.key}','line',${idx})">📈 꺾은선</div>
        <div class="chart-type-btn"        id="bt_${ev.key}" onclick="switchChartType('${ev.key}','bar',${idx})">📊 막대</div>
      </div>
      <div class="chart-wrap">
        <canvas id="chart_${ev.key}"></canvas>
      </div>`;
    area.appendChild(card);

    setTimeout(() => {
      const pb = document.getElementById('pb_' + ev.key);
      if (pb) pb.style.width = pct + '%';
    }, 150);

    buildChart(ev.key, 'line', labels, numVals, st2, LINE_C[idx], BAR_C[idx]);
  });
}

// ════════════════════════════
//  차트 생성
// ════════════════════════════
function buildChart(key, type, labels, values, st, lc, bc) {
  if (chartInst[key]) { chartInst[key].destroy(); delete chartInst[key]; }

  const isLine = type === 'line';
  chartInst[key] = new Chart(document.getElementById('chart_' + key), {
    type,
    data: {
      labels,
      datasets: [
        {
          label: '기록',
          data: values,
          borderColor:          isLine ? lc.line : 'transparent',
          backgroundColor:      isLine ? lc.fill : bc,
          borderWidth:          isLine ? 2.5 : 0,
          pointRadius:          isLine ? 5 : 0,
          pointBackgroundColor: isLine ? lc.line : 'transparent',
          pointBorderColor:     '#fff',
          pointBorderWidth:     isLine ? 2 : 0,
          fill:         isLine,
          tension:      0.38,
          spanGaps:     true,
          borderRadius: isLine ? 0 : 10
        },
        {
          label: '만점기준',
          data: Array(labels.length).fill(st.max),
          borderColor: 'rgba(212,52,26,0.4)',
          borderWidth: 1.5,
          borderDash: [6,4],
          pointRadius: 0,
          fill: false,
          type: 'line'
        }
      ]
    },
    options: {
      responsive: true,
      maintainAspectRatio: false,
      plugins: { legend:{ display:false } },
      scales: {
        x: {
          grid: { display:false },
          ticks: { font:{ size:11 }, color:'#ccc' }
        },
        y: {
          grid: { color:'#f5ede8' },
          ticks: { font:{ size:11 }, color:'#ccc' }
        }
      }
    }
  });
}

// ════════════════════════════
//  차트 타입 전환
// ════════════════════════════
function switchChartType(key, type, idx) {
  document.getElementById('lt_' + key).classList.toggle('active', type === 'line');
  document.getElementById('bt_' + key).classList.toggle('active', type === 'bar');
  const ch = chartInst[key];
  if (!ch) return;
  const gender = document.getElementById('hBadge').textContent.includes('남') ? '남' : '여';
  buildChart(key, type, ch.data.labels, ch.data.datasets[0].data, STD[gender][key], LINE_C[idx], BAR_C[idx]);
}

// ════════════════════════════
//  기록표
// ════════════════════════════
function renderTable(data) {
  const area = document.getElementById('tableArea');
  const allRows = [
    ...data.official.map(r => ({...r, isOfficial:true})),
    ...data.monthly
  ].sort((a,b) => b.date.localeCompare(a.date));

  const fmtVal = v => (v === null || v === '') ? '-' : (v === '미응시' ? '미응시' : v);

  let html = `
    <div class="table-card">
    <div class="table-wrap"><table>
      <thead><tr>
        <th>날짜</th>
        <th>배근력<br><span style="font-weight:400;color:#ddd">kg</span></th>
        <th>점수</th>
        <th>좌전굴<br><span style="font-weight:400;color:#ddd">cm</span></th>
        <th>점수</th>
        <th>멀리뛰기<br><span style="font-weight:400;color:#ddd">cm</span></th>
        <th>점수</th>
        <th>달리기<br><span style="font-weight:400;color:#ddd">초</span></th>
        <th>점수</th>
        <th>총점</th>
      </tr></thead><tbody>`;

  allRows.forEach(r => {
    const cls = r.isOfficial ? 'official-row' : '';
    const tag = r.isOfficial
      ? '<span class="tag tag-official">공식</span>'
      : '<span class="tag tag-monthly">연습</span>';
    html += `
      <tr class="${cls}">
        <td style="white-space:nowrap;font-weight:700">${r.date}${tag}</td>
        <td>${fmtVal(r.strength)}</td>
        <td>${r.strScore || '-'}</td>
        <td>${fmtVal(r.flex)}</td>
        <td>${r.flxScore || '-'}</td>
        <td>${fmtVal(r.jump)}</td>
        <td>${r.jmpScore || '-'}</td>
        <td>${fmtVal(r.run)}</td>
        <td>${r.runScore || '-'}</td>
        <td style="font-weight:700">${r.total || '-'}</td>
      </tr>`;
  });

  html += `</tbody></table></div></div>`;
  area.innerHTML = html;
}

// ════════════════════════════
//  공식테스트 아이템
// ════════════════════════════
function makeOB(icon, label, value, unit, score, st) {
  let pct = null;
  if (value !== null && value !== '미응시' && st) {
    pct = st.higher
      ? Math.round((value - st.min) / (st.max - st.min) * 100)
      : Math.round((st.min - value) / (st.min - st.max) * 100);
    pct = Math.max(0, Math.min(100, pct));
  }
  const displayVal = (value === null || value === '') ? '-' : (value === '미응시' ? '미응시' : value);
  return `
    <div class="ob-item">
      <div class="ob-item-label">${icon} ${label}</div>
      <div>
        <span class="ob-item-value">${displayVal}</span>
        <span class="ob-item-unit">${(value && value !== '미응시') ? unit : ''}</span>
      </div>
      ${score ? `<div class="ob-item-score">환산 ${score}점</div>` : ''}
      ${pct !== null ? `<div class="ob-item-pct">만점대비 ${pct}%</div>` : ''}
    </div>`;
}
</script>
